<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — AniVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>Ani<span>Verse</span></h1>
      <p>Admin Control Panel</p>
    </div>

    <div class="ip-block-alert" id="ip-block-alert" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/><path d="M12 7v6M12 15h.01"/></svg>
      <div>
        <h4>IP Address Blocked</h4>
        <p id="block-message">Too many failed attempts. Your IP has been blocked for 24 hours.</p>
      </div>
    </div>

    <form class="login-form" id="login-form" onsubmit="return AdminAuth.handleLogin(event)">
      <div class="input-group">
        <label for="username">Username</label>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" id="password" name="password" placeholder="Enter password" required />
      </div>

      <div class="login-error" id="login-error"></div>

      <div class="login-attempts" id="attempts-info"></div>

      <button type="submit" class="login-btn" id="login-btn">Access Dashboard</button>
    </form>

    <div class="login-back">
      <a href="../index.html">← Back to AniVerse</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // Check IP block status on load
    AdminAuth.checkBlockStatus();

    // Focus username
    document.getElementById('username').focus();
  </script>
</body>
</html>
